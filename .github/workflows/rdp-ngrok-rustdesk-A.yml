name: RDP + Ngrok + RustDesk + AE2025 (A)

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: "Ngrok Auth Token"
        required: true

      runtime_minutes:
        description: "Runtime Minutes"
        required: false
        default: "355"

      cycles:
        description: "0 = stop after A"
        required: false
        default: "0"

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 370

    env:
      RDP_USER: Bullettemporary
      RDP_PASS: Bullet@12345

    steps:

      - name: Enable RDP
        run: |
          $u=$env:RDP_USER
          $p=$env:RDP_PASS

          $sec = ConvertTo-SecureString $p -AsPlainText -Force

          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          }

          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Install Ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath C:\ngrok

      - name: Auth Ngrok
        run: |
          C:\ngrok\ngrok.exe authtoken "${{ inputs.ngrok_token }}"

      - name: Start Ngrok Tunnel
        run: |
          Start-Process "C:\ngrok\ngrok.exe" -ArgumentList "tcp 3389"

      - name: Install RustDesk
        run: |
          $rd = "$env:TEMP\rustdesk.msi"

          Invoke-WebRequest `
          -Uri "https://github.com/rustdesk/rustdesk/releases/download/1.3.1/rustdesk-1.3.1-x86_64.msi" `
          -OutFile $rd

          Start-Process msiexec.exe `
          -ArgumentList "/i","`"$rd`"","/quiet","/norestart" `
          -Wait

      - name: Install 7zip
        run: |
          choco install 7zip -y

      - name: Download AE2025 RAR
        run: |
          $url = "https://gofile.io/download/web/ZMqtH5"

          Invoke-WebRequest `
          -Uri $url `
          -OutFile "C:\ae.rar" `
          -UseBasicParsing

          Write-Host "========== DOWNLOAD COMPLETE =========="

          Get-Item "C:\ae.rar"

      - name: Check File Size
        run: |
          Get-Item "C:\ae.rar"

          $size = (Get-Item "C:\ae.rar").Length

          Write-Host "SIZE: $size bytes"

          if ($size -lt 100000000) {
            Write-Error "RAR too small — download failed"
            exit 1
          }

      - name: Extract AE2025
        run: |
          $pass = "lofix"

          & "C:\Program Files\7-Zip\7z.exe" x `
          "C:\ae.rar" `
          "-p$pass" `
          "-oC:\AE2025" `
          -y

          Write-Host "========== EXTRACTION COMPLETE =========="

      - name: Run Adobe Installer
        run: |
          $setup = Get-ChildItem "C:\AE2025" -Recurse -Filter "Set-up.exe" | Select-Object -First 1

          if ($setup) {

            Write-Host "FOUND INSTALLER:"
            Write-Host $setup.FullName

            Start-Process `
            -FilePath $setup.FullName `
            -ArgumentList "--silent" `
            -Wait

            Write-Host "INSTALL COMPLETE"
          }
          else {
            Write-Error "Set-up.exe not found"
            exit 1
          }

      - name: Find AfterFX
        run: |
          $ae = Get-ChildItem "C:\Program Files" -Recurse -Filter "AfterFX.exe" -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($ae) {
            echo "AE_PATH=$($ae.FullName)" >> $env:GITHUB_ENV

            Write-Host "FOUND AFTERFX:"
            Write-Host $ae.FullName
          }
          else {
            Write-Error "AfterFX.exe not found"
            exit 1
          }

      - name: Launch AE
        run: |
          Start-Process "$env:AE_PATH"

      - name: Show RDP Info
        run: |
          Start-Sleep -Seconds 15

          try {

            $r = Invoke-RestMethod "http://127.0.0.1:4040/api/tunnels"

            $tcp = ($r.tunnels | Where-Object { $_.proto -eq "tcp" }).public_url

            Write-Host ""
            Write-Host "======================================="
            Write-Host "         AE2025 RDP READY"
            Write-Host "======================================="
            Write-Host ""
            Write-Host "RDP ADDRESS:"
            Write-Host "$tcp"
            Write-Host ""
            Write-Host "USERNAME:"
            Write-Host "$env:RDP_USER"
            Write-Host ""
            Write-Host "PASSWORD:"
            Write-Host "$env:RDP_PASS"
            Write-Host ""
            Write-Host "======================================="
          }
          catch {
            Write-Host "Ngrok tunnel not found"
            exit 1
          }

      - name: Keep Alive
        run: |
          $mins = [int]"${{ inputs.runtime_minutes }}"
          $end = (Get-Date).AddMinutes($mins)

          while ((Get-Date) -lt $end) {
            Write-Host "AE2025 RDP Running..."
            Start-Sleep -Seconds 60
          }

      - name: Dispatch B
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cycles = [int]"${{ inputs.cycles }}"

          if ($cycles -gt 0) {

            $next = $cycles - 1

            $payload = @{
              ngrok_token = "${{ inputs.ngrok_token }}"
              runtime_minutes = "${{ inputs.runtime_minutes }}"
              cycles = "$next"
            }

            $body = @{
              ref = "${{ github.ref_name }}"
              inputs = $payload
            } | ConvertTo-Json -Depth 20

            Invoke-WebRequest `
            -Method POST `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-ngrok-rustdesk-B.yml/dispatches" `
            -Headers @{
              Authorization = "Bearer $env:GH_TOKEN"
              Accept = "application/vnd.github+json"
            } `
            -Body $body
          }
