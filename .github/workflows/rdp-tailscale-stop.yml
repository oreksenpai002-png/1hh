name: Stop RDP

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  stop:
    runs-on: ubuntu-latest

    steps:

      - name: Stop Session
        run: |
          Write-Host ""
          Write-Host "======================="
          Write-Host "RDP SESSION STOPPED"
          Write-Host "======================="
          Write-Host "Cleanup Complete"
          Write-Host "======================="
